schemaVersion: "2"
kind: sandbox
name: claude-on-shell
displayName: Claude on Shell
description: "Claude Code on the shell template, authenticated via ANTHROPIC_API_KEY (proxy)"

# v2: the old `agent:` block becomes `sandbox:`.
sandbox:
  # MUST match the tag built from ../template/Dockerfile.
  image: "docker.io/philippecharriere494/sbx-my-claude-agent:0.0.0"
  aiFilename: CLAUDE.md
  entrypoint:
    run: [claude, "--dangerously-skip-permissions"]
  # NB: v1's `persistence:` is removed in v2 (no effect).

# v2: `credentials.sources` + `network.serviceDomains/serviceAuth` merge here.
# The proxy reads `ANTHROPIC_API_KEY` on the host (apiKey.name) and injects it
# per domain (apiKey.inject). The real secret never enters the container.
credentials:
  - service: anthropic
    apiKey:
      name: ANTHROPIC_API_KEY
      inject:
        - domain: api.anthropic.com
          header: x-api-key
          format: "%s"
        - domain: console.anthropic.com
          header: x-api-key
          format: "%s"
        - domain: claude.ai
          header: x-api-key
          format: "%s"

# v2: `network.allowedDomains` becomes `caps.network.allow`.
caps:
  network:
    allow:
      - "api.anthropic.com:443"
      - "claude.ai:443"
      - "console.anthropic.com:443"
      - "downloads.claude.ai:443"
      - "statsig.anthropic.com:443"

environment:
  variables:
    IS_SANDBOX: "1"

# Startup bootstrap: avoids the "trust this project?" dialog and the /login.
commands:
  install:
    # 1. Seed ~/.claude.json: onboarding / trust / bypass flags.
    - command: |
        set -e
        printf '%s\n' '{
          "bypassPermissionsModeAccepted": true,
          "hasCompletedOnboarding": true,
          "projects": { "/": { "hasTrustDialogAccepted": true } }
        }' > /home/agent/.claude.json
        chown agent:agent /home/agent/.claude.json
      user: "0"
      description: "Seed Claude onboarding/trust flags (~/.claude.json)"
    # 2. Seed ~/.claude/settings.json: apiKeyHelper -> no /login.
    - command: |
        set -e
        mkdir -p /home/agent/.claude
        printf '%s' '{
          "themeId": 1,
          "apiKeyHelper": "echo proxy-managed",
          "defaultMode": "bypassPermissions",
          "bypassPermissionsModeAccepted": true
        }' > /home/agent/.claude/settings.json
      user: "agent"
      description: "Seed settings.json (apiKeyHelper -> no /login)"
  startup:
    - command: ["sh", "-c", "chown -R agent:agent /home/agent/.claude 2>/dev/null || true"]
      user: "0"
      description: "Re-own ~/.claude to agent"

agentContext: |
  ## Claude-on-Shell sandbox

  You are running in a Docker sandbox built on the `shell` template, with the
  Claude CLI installed. `CLAUDE_ENV_FILE=/etc/sandbox-persistent.sh` is sourced
  before every Bash command: any `export`s you add there persist from one tool
  call to the next.
